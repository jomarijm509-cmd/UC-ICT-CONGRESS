{% extends "base.html" %}
{% block title %}{{ 'Edit' if mode == 'edit' else 'Register' }} Student{% endblock %}
{% block content %}
<div class="panel-head">
    <h1>{{ 'Edit Student' if mode == 'edit' else 'Register a Student' }}</h1>
    <a class="btn btn-ghost" href="{{ url_for('registration') }}">Cancel</a>
</div>

<form class="form-card" method="POST">
    <div class="field">
        <label for="idNum">Student ID Number</label>
        <input type="text" id="idNum" name="idNum" value="{{ form.idNum or '' }}"
               {% if mode == 'edit' %}readonly{% endif %} required>
    </div>

    <div class="field">
        <label for="campus">Campus</label>
        <select id="campus" name="campus" required>
            {% for c in ['Main','Banilad','LM','Pardo'] %}
            <option value="{{ c }}" {% if form.campus == c %}selected{% endif %}>{{ c }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="field">
        <label for="studFName">First Name</label>
        <input type="text" id="studFName" name="studFName" value="{{ form.studFName or '' }}" required>
    </div>

    <div class="field">
        <label for="studLName">Last Name</label>
        <input type="text" id="studLName" name="studLName" value="{{ form.studLName or '' }}" required>
    </div>

    <div class="field">
        <label for="amountPaid">Amount Paid</label>
        <input type="number" step="0.01" min="0" id="amountPaid" name="amountPaid" value="{{ form.amountPaid or '' }}" required>
    </div>

    <button type="submit" class="btn btn-primary">{{ 'Save Changes' if mode == 'edit' else 'Register Student' }}</button>
</form>
{% endblock %}
